<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Crib is the African-first digital marketplace for creatives." />
    <title>Crib - Home for Creatives</title>
    <script>
      (() => {
        try {
          const theme = window.localStorage.getItem("crib-theme") === "dark" ? "dark" : "light";
          const root = document.documentElement;
          if (theme === "dark") {
            root.classList.add("theme-dark");
          }
          root.style.colorScheme = theme;
        } catch {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
