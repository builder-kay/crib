<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Discover and sell African-first digital assets, beats, templates, design resources, and creative services on Crib." />
    <meta name="robots" content="index,follow" />
    <meta name="theme-color" content="#1754ec" />
    <meta property="og:site_name" content="Crib" />
    <meta property="og:title" content="Crib - African Digital Marketplace for Creatives" />
    <meta property="og:description" content="Buy, sell, and hire African creative talent across digital assets, beats, templates, design, music, and film." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/crib-logo.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Crib - African Digital Marketplace for Creatives" />
    <meta name="twitter:description" content="Buy, sell, and hire African creative talent across digital assets, beats, templates, design, music, and film." />
    <meta name="twitter:image" content="/crib-logo.png" />
    <link rel="icon" href="/crib-logo.png" />
    <link rel="apple-touch-icon" href="/crib-logo.png" />
    <title>Crib - African Digital Marketplace for Creatives</title>
    <script>
      (() => {
        try {
          const theme = window.localStorage.getItem("crib-theme") === "dark" ? "dark" : "light";
          const root = document.documentElement;
          if (theme === "dark") {
            root.classList.add("theme-dark");
          }
          root.style.colorScheme = theme;
        } catch {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
